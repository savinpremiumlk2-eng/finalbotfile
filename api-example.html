<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Bot API Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }
    .section {
      margin-bottom: 25px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .section h2 {
      font-size: 16px;
      color: #667eea;
      margin-bottom: 12px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    input {
      background: white;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
    .output {
      background: #1e1e1e;
      color: #00ff00;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 WhatsApp Bot API</h1>

    <div class="section">
      <h2>🔐 Login</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <div id="loginOutput" class="output"></div>
    </div>

    <div class="section">
      <h2>📱 Get QR Code</h2>
      <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Generate a QR code to scan and add a new WhatsApp session</p>
      <button onclick="getQR()">Generate QR Code</button>
      <div id="qrOutput" class="output"></div>
      <div id="qrImage" style="margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="section">
      <h2>📞 Get Pairing Code</h2>
      <input type="tel" id="phoneNumber" placeholder="Phone number (e.g., 15551234567)">
      <button onclick="getPairingCode()">Get Pairing Code</button>
      <div id="pairingOutput" class="output"></div>
    </div>

    <div class="section">
      <h2>📊 Get Bot Status</h2>
      <button onclick="getStatus()">Fetch Status</button>
      <div id="statusOutput" class="output"></div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const output = document.getElementById('loginOutput');

      if (!username || !password) {
        output.innerHTML = '<span class="error">Please enter username and password</span>';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (data.success) {
          output.innerHTML = '<span class="success">✓ Login successful!</span>';
          localStorage.setItem('loggedIn', 'true');
        } else {
          output.innerHTML = `<span class="error">✗ ${data.message}</span>`;
        }
      } catch (error) {
        output.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    }

    async function getQR() {
      const output = document.getElementById('qrOutput');
      const qrImage = document.getElementById('qrImage');

      output.innerHTML = 'Loading QR code...';
      qrImage.innerHTML = '';

      try {
        const response = await fetch(`${API_URL}/api/qr`, {
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.status === 401) {
          output.innerHTML = '<span class="error">Not authenticated. Please login first.</span>';
          return;
        }

        const data = await response.json();
        if (data.success) {
          output.innerHTML = `<span class="success">✓ QR Code Generated (ID: ${data.qrId})</span>`;
          qrImage.innerHTML = `<img src="${data.qr}" style="max-width: 200px; border: 2px solid #667eea; border-radius: 8px;">`;
        } else {
          output.innerHTML = `<span class="error">✗ ${data.message}</span>`;
        }
      } catch (error) {
        output.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    }

    async function getPairingCode() {
      const phoneNumber = document.getElementById('phoneNumber').value;
      const output = document.getElementById('pairingOutput');

      if (!phoneNumber) {
        output.innerHTML = '<span class="error">Please enter a phone number</span>';
        return;
      }

      output.innerHTML = 'Generating pairing code...';

      try {
        const response = await fetch(`${API_URL}/api/pair`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ number: phoneNumber })
        });

        if (response.status === 401) {
          output.innerHTML = '<span class="error">Not authenticated. Please login first.</span>';
          return;
        }

        const data = await response.json();
        if (data.success) {
          output.innerHTML = `<span class="success">✓ Pairing Code: <strong>${data.code}</strong>\n\nSession ID: ${data.pairId}</span>`;
        } else {
          output.innerHTML = `<span class="error">✗ ${data.message}</span>`;
        }
      } catch (error) {
        output.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    }

    async function getStatus() {
      const output = document.getElementById('statusOutput');

      output.innerHTML = 'Fetching status...';

      try {
        const response = await fetch(`${API_URL}/api/status`, {
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.status === 401) {
          output.innerHTML = '<span class="error">Not authenticated. Please login first.</span>';
          return;
        }

        const data = await response.json();
        if (data.success) {
          output.innerHTML = `<span class="success">✓ Bot Status

Status: ${data.status}
Uptime: ${data.uptimeFormatted}
Memory: ${data.memory.heapUsed} / ${data.memory.heapTotal}
Active Sessions: ${data.activeSessions}
Timestamp: ${data.timestamp}</span>`;
        } else {
          output.innerHTML = `<span class="error">✗ ${data.message}</span>`;
        }
      } catch (error) {
        output.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    }
  </script>
</body>
</html>
